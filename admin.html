<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>لوحة كونتننتال | إدارة المحتوى</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="brand-header">
      <div class="brand-logo">
        <img
          src="logo.png"
          alt="Logo"
          onerror="this.src = 'https://via.placeholder.com/90?text=LOGO'"
        />
      </div>
      <h1 class="brand-name">Continental for Business Completion Services</h1>
      <div class="admin-title">قسم إدارة المحتوى</div>
    </div>

    <div class="container">
      <div class="card">
        <h2><i class="fas fa-edit"></i> إضافة خبر جديد</h2>
        <div class="form-group">
          <label>عنوان الخبر</label>
          <input type="text" id="newsTitle" placeholder="أدخل العنوان هنا..." />
        </div>
        <div class="form-group">
          <label>نوع الخبر</label>
          <select id="newsType">
            <option value="Company News">Company News</option>
            <option value="Important news">
              The latest news of the Ministry
            </option>
            <option value="Greetings and Offers">Greetings and Offers</option>
          </select>
        </div>
        <div class="form-group">
          <label>الصورة (اختياري)</label>
          <input
            type="file"
            id="fileInput"
            accept="image/*"
            class="file-input"
          />
          <div
            class="upload-area"
            id="uploadArea"
          >
            <i class="fas fa-cloud-upload-alt upload-icon"></i>
            <div id="uploadText">اضغط لاختيار صورة من جهازك</div>
            <center><img id="imagePreview" /></center>
          </div>
          <button
            type="button"
            id="removeImgBtn"
            class="remove-img-btn"
          >
            إلغاء الصورة ✕
          </button>
        </div>
        <div class="form-group">
          <label>تفاصيل الخبر</label>
          <textarea
            id="newsContent"
            rows="4"
            placeholder="اكتب تفاصيل الخبر هنا..."
          ></textarea>
        </div>
        <button class="btn-publish" id="publishBtn">
          <i class="fas fa-paper-plane"></i> نشر الآن
        </button>
        <div id="status"></div>
      </div>

      <div id="manageSection">
        <h3 class="manage-title">
          <i class="fas fa-list-check"></i> السجل الحالي للمنشورات
        </h3>
        <div id="newsList">
          <p class="empty-message">جاري تحميل الأخبار...</p>
        </div>
      </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="app.js"></script>
  </body>
</html>
